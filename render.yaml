services:
  - type: web
    name: ai-debate
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # API keys are optional — users provide their own via the browser UI.
      # Set these only if you want a server-side fallback (e.g. demo mode).
      # - key: ANTHROPIC_API_KEY
      #   sync: false
      # - key: GOOGLE_API_KEY
      #   sync: false
      # - key: OPENAI_API_KEY
      #   sync: false
